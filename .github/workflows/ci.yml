name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: stockpilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run format:check

      - run: npm run lint

      - run: npx tsc --noEmit

      - run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/stockpilot_test

      - run: npm test
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/stockpilot_test
